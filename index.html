<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bookshop Clicker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game">
    <h1>📚 Bookshop Clicker</h1>
    <div id="counter">Books: 0</div>

    <button id="bookBtn">📖</button>
  </div>

  <!-- 🛒 SHOP -->
  <div id="shop">
    <h2>Shop</h2>

    <button id="buyLibrarian">
      📖 Librarian (+1 per click)<br>
      Cost: 10 books
    </button>

    <p id="upgradeInfo"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
